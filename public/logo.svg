<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <!-- Main circle gradient (amber/orange) -->
    <radialGradient id="circleGrad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="60%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>

    <!-- Leaf gradient (green) -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>

    <!-- Shine overlay -->
    <radialGradient id="shine" cx="35%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.22)"/>
    </filter>

    <!-- Glow filter for circle -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Circle badge ── -->
  <g filter="url(#shadow)">
    <!-- Outer glow ring -->
    <circle cx="40" cy="40" r="36" fill="none" stroke="#FF8F00" stroke-width="2" opacity="0.3"/>
    <!-- Main circle -->
    <circle cx="40" cy="40" r="34" fill="url(#circleGrad)"/>
    <!-- Shine highlight -->
    <circle cx="40" cy="40" r="34" fill="url(#shine)"/>
  </g>

  <!-- ── Leaf (top of the P) ── -->
  <ellipse cx="40" cy="11" rx="6" ry="10" fill="url(#leafGrad)" transform="rotate(-15 40 11)"/>
  <ellipse cx="46" cy="9" rx="4" ry="7" fill="url(#leafGrad)" opacity="0.7" transform="rotate(10 46 9)"/>

  <!-- ── Letter P ── -->
  <text
    x="40" y="53"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="38"
    font-weight="900"
    fill="#FFFFFF"
    filter="url(#shadow)"
    letter-spacing="-1"
  >P</text>

  <!-- ── Brand Name ── -->
  <text
    x="87" y="34"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="900"
    fill="url(#textGrad)"
    letter-spacing="-0.5"
  >PROTINE</text>

  <!-- ── Tagline word ── -->
  <text
    x="88" y="55"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="16"
    font-weight="700"
    fill="#FF8F00"
    letter-spacing="4"
  >WEB</text>

  <!-- ── Divider line ── -->
  <rect x="87" y="59" width="180" height="2" rx="1" fill="url(#textGrad)" opacity="0.25"/>

  <!-- ── Sub-tagline ── -->
  <text
    x="88" y="73"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="9"
    fill="#4CAF50"
    letter-spacing="1.5"
    opacity="0.85"
  >PREMIUM FOOD &amp; SAUCES</text>
</svg>
