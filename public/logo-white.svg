<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <radialGradient id="circleGradW" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="60%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <linearGradient id="leafGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <radialGradient id="shineW" cx="35%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadowW">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Circle badge -->
  <circle cx="40" cy="40" r="36" fill="url(#circleGradW)" filter="url(#shadowW)"/>
  <circle cx="40" cy="40" r="36" fill="url(#shineW)"/>

  <!-- Leaves -->
  <ellipse cx="39" cy="11" rx="5.5" ry="9" fill="url(#leafGradW)" transform="rotate(-15 39 11)"/>
  <ellipse cx="46" cy="9" rx="4" ry="7" fill="url(#leafGradW)" opacity="0.75" transform="rotate(10 46 9)"/>

  <!-- P -->
  <text x="40" y="53" text-anchor="middle"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="38" font-weight="900" fill="#FFFFFF" filter="url(#shadowW)" letter-spacing="-1"
  >P</text>

  <!-- Brand name (white) -->
  <text x="87" y="34"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="22" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5"
  >PROTINE</text>

  <!-- WEB in amber -->
  <text x="88" y="55"
    font-family="Arial,Helvetica,sans-serif"
    font-size="16" font-weight="700" fill="#FFB300" letter-spacing="4"
  >WEB</text>

  <!-- Divider -->
  <rect x="87" y="59" width="180" height="1.5" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Tagline -->
  <text x="88" y="73"
    font-family="Arial,Helvetica,sans-serif"
    font-size="9" fill="rgba(255,255,255,0.7)" letter-spacing="1.5"
  >PREMIUM FOOD &amp; SAUCES</text>
</svg>
